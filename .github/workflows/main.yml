name: Update IPTV Sources and Deploy

on:
  workflow_dispatch:   # 允许手动触发
  schedule:
    - cron: "0 */2 * * *"  # 每2小时自动运行

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 延长超时时间，避免大源构建超时

    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 升级到v5，兼容Node22
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9  # 升级pnpm到最新稳定版

      - name: Setup Node.js
        uses: actions/setup-node@v5  # 升级到v5，兼容Node22
        with:
          node-version: 22  # 核心修改：从20改成22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build sources
        run: pnpm build:static

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.PROJECT_NAME }}
          directory: m3u
